<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskForce - Glassmorphism UI</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="blob-c blob-1"></div>
    <div class="blob-c blob-2"></div>
    
    <div class="glass-container">
        <header>
            <h1>TaskForce <i class="fa-solid fa-bolt"></i></h1>
            <p>Master Your Objectives</p>
        </header>

        <form id="task-form">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit" id="add-btn"><i class="fa-solid fa-plus"></i></button>
            </div>
        </form>

        <ul id="task-list">
            <!-- Tasks will strictly be injected dynamically via JS -->
            <div class="empty-state">
                <i class="fa-solid fa-check-double drop-glow"></i>
                <p>All tasks completed.</p>
            </div>
        </ul>
    </div>

    <!-- Custom Logic -->
    <script src="/static/script.js"></script>
</body>
</html>
